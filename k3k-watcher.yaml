---
# Deployment that watches k3k server pods for HA issues.
#
# Handles four scenarios that k3k does not manage natively:
#
#   1. Etcd quorum deadlock (HA only) — all pods CrashLoopBackOff with
#      "timed out waiting for node to change IP". Auto-recovers by temporarily
#      scaling to 1 server (triggers k3k's built-in cluster-reset), then back
#      to original count. State tracked via Cluster CR annotations.
#      Upstream: https://github.com/rancher/k3k/issues/678
#
#   2. HA server pod imbalance — after node drain/uncordon, multiple server pods
#      may land on the same node, breaking HA protection. Detects imbalance and
#      deletes the highest-ordinal pod on the most-loaded node so the scheduler
#      redistributes it. Protects server-0, respects cordoned nodes, and uses
#      debounce/cooldown to prevent delete loops. Guard math is ceil(N/M)
#      (where N = server_count, M = schedulable_nodes) — rebalances any
#      topology with at least 2 schedulable nodes, including N>M setups
#      (e.g. 5 servers on 3 nodes settles to 2-2-1 instead of 3-2-0).
#      Upstream: https://github.com/rancher/k3k/issues/522
#
#   3. Etcd quorum loss with stuck pods — when Ready server pods drop below
#      quorum AND the not-ready pods are stuck on cordoned/Failed/NotReady
#      nodes AND their Longhorn replicas are reachable on a Ready+schedulable
#      node, force-delete them so the StatefulSet recreates them elsewhere.
#      Strips etcdpod.k3k.io/finalizer before deleting (k3k controller cannot
#      remove it without quorum — chicken/egg). Different from scenario 1:
#      triggers when only some pods are dead (not all crashlooping).
#      Verifies replica reachability before deleting to avoid recreating
#      pods that would hang in ContainerCreating.
#
#   4. Safe-mode wedge (k3k#836) — when a server pod is rescheduled to a new
#      node, k3k's per-pod init wrapper polls for the new pod IP in the Node
#      list for 120s. If the timeout fires, k3s FATALs and the persisted
#      /var/lib/rancher/k3s/k3k-node-ip is never updated, so every restart
#      compares fresh pod IPs against stale persisted state and re-FATALs
#      forever. Detects via "timed out waiting for node to change IP" in
#      previous-instance logs, then exec-rms the stale file and force-restarts
#      the pod. Per-pod 180s cooldown to avoid races with restart cycles.
#      Runbook: docs/runbooks/k3k-server-pod-safe-mode-wedge.md
#      Upstream: https://github.com/rancher/k3k/issues/836
#
# Native k3k handles (no longer monitored here):
#   - Ingress sync: spec.sync.ingresses.enabled=true
#   - Flannel crash recovery: safe_mode in template.go (PR #598)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k3k-watcher
  namespace: rancher-k3k
  labels:
    app: k3k-watcher
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k3k-watcher
  template:
    metadata:
      labels:
        app: k3k-watcher
    spec:
      serviceAccountName: k3k-watcher
      containers:
        - name: watcher
          image: alpine/kubectl:1.34.2
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
          command:
            - sh
            - -c
            - |
              NS="rancher-k3k"
              CLUSTER="rancher"
              POLL_INTERVAL=10
              STATE_DIR="/tmp/watcher-state"

              mkdir -p "$STATE_DIR"
              RECOVERY_TIMEOUT=600   # 10 minutes per state
              REBALANCE_SETTLE=60    # seconds after pod Ready before rebalancing
              REBALANCE_DEBOUNCE=300 # seconds between rebalance attempts
              REBALANCE_COOLDOWN=1800 # seconds cooldown after failed move
              log() { echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] $*"; }

              # Parse ISO 8601 timestamp to epoch (BusyBox date needs space not T, no trailing Z)
              parse_epoch() { local ts="${1/T/ }"; date -d "${ts%Z}" +%s 2>/dev/null || echo "0"; }

              # Per-pod state helpers (file-based to support dynamic pod count)
              get_state() { cat "$STATE_DIR/$1.$2" 2>/dev/null || echo ""; }
              set_state() { printf '%s' "$3" > "$STATE_DIR/$1.$2"; }

              # --- Etcd quorum deadlock detection ---
              check_etcd_deadlock() {
                  local server_count
                  server_count=$(kubectl get clusters.k3k.io "$CLUSTER" -n "$NS" \
                      -o jsonpath='{.spec.servers}' 2>/dev/null || echo "1")
                  [ "$server_count" -le 1 ] && return 1

                  local total=0 crash=0 etcd_timeout=false
                  for P in $(kubectl get pods -l "cluster=$CLUSTER,role=server" -n "$NS" \
                      -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
                      total=$((total + 1))
                      local wait_reason
                      wait_reason=$(kubectl get pod "$P" -n "$NS" \
                          -o jsonpath='{.status.containerStatuses[0].state.waiting.reason}' \
                          2>/dev/null || echo "")
                      if [ "$wait_reason" = "CrashLoopBackOff" ]; then
                          crash=$((crash + 1))
                          if kubectl logs "$P" -n "$NS" --previous --tail=20 2>/dev/null \
                              | grep -q "timed out waiting for node to change IP"; then
                              etcd_timeout=true
                          fi
                      fi
                  done

                  [ "$total" -gt 1 ] && [ "$crash" -eq "$total" ] && [ "$etcd_timeout" = "true" ]
              }

              # --- Etcd quorum recovery state machine ---
              recover_etcd_quorum() {
                  local recovery_state recovery_started
                  recovery_state=$(kubectl get clusters.k3k.io "$CLUSTER" -n "$NS" \
                      -o jsonpath='{.metadata.annotations.k3k\.io/etcd-recovery-state}' \
                      2>/dev/null || echo "")
                  recovery_started=$(kubectl get clusters.k3k.io "$CLUSTER" -n "$NS" \
                      -o jsonpath='{.metadata.annotations.k3k\.io/etcd-recovery-started}' \
                      2>/dev/null || echo "")

                  # Check timeout for current state
                  if [ -n "$recovery_started" ]; then
                      local started_epoch now_epoch elapsed
                      started_epoch=$(parse_epoch "$recovery_started")
                      now_epoch=$(date +%s)
                      elapsed=$((now_epoch - started_epoch))
                      if [ "$elapsed" -gt "$RECOVERY_TIMEOUT" ]; then
                          log "ERROR: Etcd recovery state '$recovery_state' timed out after ${elapsed}s"
                          kubectl annotate clusters.k3k.io "$CLUSTER" -n "$NS" --overwrite \
                              "k3k.io/etcd-recovery-state=failed"
                          return 1
                      fi
                  fi

                  case "$recovery_state" in
                      "")
                          # Initial trigger — start recovery
                          log "ETCD DEADLOCK DETECTED — Starting quorum recovery"
                          local original_servers now_ts
                          original_servers=$(kubectl get clusters.k3k.io "$CLUSTER" -n "$NS" \
                              -o jsonpath='{.spec.servers}' 2>/dev/null || echo "3")
                          now_ts=$(date -u +%Y-%m-%dT%H:%M:%SZ)
                          kubectl annotate clusters.k3k.io "$CLUSTER" -n "$NS" --overwrite \
                              "k3k.io/etcd-recovery-state=scaling-down" \
                              "k3k.io/etcd-original-servers=$original_servers" \
                              "k3k.io/etcd-recovery-started=$now_ts"
                          log "Patching spec.servers to 1 (was $original_servers)"
                          kubectl patch clusters.k3k.io "$CLUSTER" -n "$NS" --type=merge \
                              -p '{"spec":{"servers":1}}'
                          ;;
                      scaling-down)
                          local pod_count server0_ready
                          pod_count=$(kubectl get pods -l "cluster=$CLUSTER,role=server" -n "$NS" \
                              --no-headers 2>/dev/null | wc -l)
                          server0_ready=$(kubectl get pod "${CLUSTER}-server-0" -n "$NS" \
                              -o jsonpath='{.status.containerStatuses[0].ready}' 2>/dev/null || echo "false")
                          log "scaling-down: ${pod_count} pod(s), server-0 ready=${server0_ready}"
                          if [ "$pod_count" -le 1 ] && [ "$server0_ready" = "true" ]; then
                              log "Single server-0 pod is Running — transitioning to resetting"
                              kubectl annotate clusters.k3k.io "$CLUSTER" -n "$NS" --overwrite \
                                  "k3k.io/etcd-recovery-state=resetting" \
                                  "k3k.io/etcd-recovery-started=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
                          fi
                          ;;
                      resetting)
                          local phase
                          phase=$(kubectl get clusters.k3k.io "$CLUSTER" -n "$NS" \
                              -o jsonpath='{.status.phase}' 2>/dev/null || echo "")
                          log "resetting: cluster phase=${phase}"
                          if [ "$phase" = "Ready" ]; then
                              local original_servers
                              original_servers=$(kubectl get clusters.k3k.io "$CLUSTER" -n "$NS" \
                                  -o jsonpath='{.metadata.annotations.k3k\.io/etcd-original-servers}' \
                                  2>/dev/null || echo "3")
                              log "Cluster Ready after reset — scaling back to $original_servers servers"
                              kubectl patch clusters.k3k.io "$CLUSTER" -n "$NS" --type=merge \
                                  -p "{\"spec\":{\"servers\":${original_servers}}}"
                              kubectl annotate clusters.k3k.io "$CLUSTER" -n "$NS" --overwrite \
                                  "k3k.io/etcd-recovery-state=scaling-up" \
                                  "k3k.io/etcd-recovery-started=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
                          fi
                          ;;
                      scaling-up)
                          local original_servers ready_count=0 phase
                          original_servers=$(kubectl get clusters.k3k.io "$CLUSTER" -n "$NS" \
                              -o jsonpath='{.metadata.annotations.k3k\.io/etcd-original-servers}' \
                              2>/dev/null || echo "3")
                          for P in $(kubectl get pods -l "cluster=$CLUSTER,role=server" -n "$NS" \
                              -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
                              local pod_ready
                              pod_ready=$(kubectl get pod "$P" -n "$NS" \
                                  -o jsonpath='{.status.containerStatuses[0].ready}' 2>/dev/null || echo "false")
                              [ "$pod_ready" = "true" ] && ready_count=$((ready_count + 1))
                          done
                          phase=$(kubectl get clusters.k3k.io "$CLUSTER" -n "$NS" \
                              -o jsonpath='{.status.phase}' 2>/dev/null || echo "")
                          log "scaling-up: ${ready_count}/${original_servers} pods ready, phase=${phase}"
                          if [ "$ready_count" -ge "$original_servers" ] && [ "$phase" = "Ready" ]; then
                              log "SUCCESS: All $original_servers servers ready — etcd quorum recovered"
                              kubectl annotate clusters.k3k.io "$CLUSTER" -n "$NS" \
                                  "k3k.io/etcd-recovery-state-" \
                                  "k3k.io/etcd-original-servers-" \
                                  "k3k.io/etcd-recovery-started-"
                          fi
                          ;;
                      failed)
                          log "Etcd recovery in FAILED state — manual intervention required"
                          ;;
                  esac
              }

              # --- Etcd quorum-loss recovery (force-delete stuck pods) ---
              # Triggers when Ready server pods < quorum AND some pods are
              # stuck on cordoned/Failed/NotReady nodes. Verifies the stuck
              # pods' Longhorn PVCs have a replica on a Ready+schedulable node
              # before force-deleting (otherwise the recreated pod hangs in
              # ContainerCreating). Cooldown of 120s between actions to allow
              # etcd time to elect a leader before re-intervening.
              QUORUM_RECOVERY_COOLDOWN=120
              check_quorum_loss() {
                  local server_count
                  server_count=$(kubectl get clusters.k3k.io "$CLUSTER" -n "$NS" \
                      -o jsonpath='{.spec.servers}' 2>/dev/null || echo "1")
                  [ "$server_count" -le 1 ] && return 0
                  local quorum=$(( server_count / 2 + 1 ))

                  # Skip if scenario 1 owns recovery
                  local recovery_state
                  recovery_state=$(kubectl get clusters.k3k.io "$CLUSTER" -n "$NS" \
                      -o jsonpath='{.metadata.annotations.k3k\.io/etcd-recovery-state}' \
                      2>/dev/null || echo "")
                  if [ -n "$recovery_state" ] && [ "$recovery_state" != "failed" ]; then
                      return 0
                  fi

                  local ready=0 stuck_pods=""
                  for P in $(kubectl get pods -l "cluster=$CLUSTER,role=server" -n "$NS" \
                      -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
                      local pod_ready node_name node_unsched node_ready phase
                      pod_ready=$(kubectl get pod "$P" -n "$NS" \
                          -o jsonpath='{.status.containerStatuses[0].ready}' 2>/dev/null || echo "false")
                      if [ "$pod_ready" = "true" ]; then
                          ready=$((ready + 1))
                          continue
                      fi
                      node_name=$(kubectl get pod "$P" -n "$NS" \
                          -o jsonpath='{.spec.nodeName}' 2>/dev/null || echo "")
                      [ -z "$node_name" ] && continue
                      node_unsched=$(kubectl get node "$node_name" \
                          -o jsonpath='{.spec.unschedulable}' 2>/dev/null || echo "")
                      node_ready=$(kubectl get node "$node_name" \
                          -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' \
                          2>/dev/null || echo "")
                      phase=$(kubectl get pod "$P" -n "$NS" \
                          -o jsonpath='{.status.phase}' 2>/dev/null || echo "")
                      # "Stuck" = on cordoned node, on NotReady node, or in Failed phase
                      if [ "$node_unsched" = "true" ] || [ "$node_ready" != "True" ] \
                              || [ "$phase" = "Failed" ]; then
                          stuck_pods="$stuck_pods $P"
                      fi
                  done

                  [ "$ready" -ge "$quorum" ] && return 0
                  if [ -z "$stuck_pods" ]; then
                      log "QUORUM-LOSS: ${ready}/${server_count} ready (need ${quorum}), no stuck pods on cordoned/NotReady/Failed nodes"
                      return 0
                  fi

                  # Cooldown
                  local last_action
                  last_action=$(get_state "cluster" "quorum_recovery_last_action")
                  if [ -n "$last_action" ]; then
                      local last_epoch now_epoch elapsed
                      last_epoch=$(parse_epoch "$last_action")
                      now_epoch=$(date +%s)
                      elapsed=$((now_epoch - last_epoch))
                      if [ "$elapsed" -lt "$QUORUM_RECOVERY_COOLDOWN" ]; then
                          return 0
                      fi
                  fi

                  log "QUORUM-LOSS: ${ready}/${server_count} ready (need ${quorum}). Stuck:$stuck_pods"

                  # Verify each stuck pod's PVC has a Longhorn replica reachable
                  local actionable=""
                  for P in $stuck_pods; do
                      local pvc_name pv_name replica_nodes can_attach=false
                      pvc_name="varlibrancherk3s-$P"
                      pv_name=$(kubectl get pvc "$pvc_name" -n "$NS" \
                          -o jsonpath='{.spec.volumeName}' 2>/dev/null || echo "")
                      if [ -z "$pv_name" ]; then
                          log "QUORUM-LOSS: $P pvc=$pvc_name not found — skipping"
                          continue
                      fi
                      replica_nodes=$(kubectl get replicas.longhorn.io -n longhorn-system \
                          -o jsonpath="{range .items[?(@.spec.volumeName=='$pv_name')]}{.spec.nodeID} {end}" \
                          2>/dev/null)
                      for RN in $replica_nodes; do
                          local rn_unsched rn_ready
                          rn_unsched=$(kubectl get node "$RN" -o jsonpath='{.spec.unschedulable}' 2>/dev/null || echo "")
                          rn_ready=$(kubectl get node "$RN" -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || echo "")
                          if [ "$rn_unsched" != "true" ] && [ "$rn_ready" = "True" ]; then
                              can_attach=true
                              break
                          fi
                      done
                      if [ "$can_attach" = "true" ]; then
                          actionable="$actionable $P"
                      else
                          log "QUORUM-LOSS: $P (pv=$pv_name) has no replicas on Ready+schedulable nodes — skipping (would hang in ContainerCreating)"
                      fi
                  done

                  if [ -z "$actionable" ]; then
                      log "QUORUM-LOSS: no actionable pods (replicas all stranded)"
                      return 0
                  fi

                  log "QUORUM-LOSS: force-deleting:$actionable"
                  set_state "cluster" "quorum_recovery_last_action" "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
                  for P in $actionable; do
                      # Strip etcdpod.k3k.io/finalizer first — k3k controller cannot
                      # remove it without quorum (chicken/egg), so deletion hangs.
                      # Pod stays Failed with deletionTimestamp set, blocking the
                      # StatefulSet from recreating it. We accept that the dead
                      # etcd member entry remains in cluster membership; new pods
                      # rejoin under the same member identity via persisted PVC.
                      local finalizers
                      finalizers=$(kubectl get pod "$P" -n "$NS" \
                          -o jsonpath='{.metadata.finalizers}' 2>/dev/null || echo "")
                      if echo "$finalizers" | grep -q "etcdpod.k3k.io/finalizer"; then
                          log "QUORUM-LOSS: stripping finalizers from $P"
                          kubectl patch pod "$P" -n "$NS" --type=merge \
                              -p '{"metadata":{"finalizers":null}}' 2>/dev/null || true
                      fi
                      kubectl delete pod "$P" -n "$NS" --force --grace-period=0 2>/dev/null || true
                  done
                  log "QUORUM-LOSS: force-delete dispatched — StatefulSet will recreate on Ready nodes"
              }

              # --- Safe-mode wedge recovery (k3k#836) ---
              # k3k's per-pod init wrapper persists the last pod IP at
              # /var/lib/rancher/k3s/k3k-node-ip on the PVC. When a pod is
              # rescheduled to a new node (different pod IP), safe_mode polls
              # the Node list for the new IP for up to 120s. If the new IP
              # doesn't appear in time, k3s FATALs and the container restarts.
              # Subsequent restarts get fresh pod IPs but compare against the
              # same stale persisted value — the pod is wedged forever.
              # Fix: rm the persisted file so safe_mode finds CURRENT_IP="" and
              # short-circuits, letting k3s boot normally and register fresh.
              # Runbook: docs/runbooks/k3k-server-pod-safe-mode-wedge.md
              # Upstream: https://github.com/rancher/k3k/issues/836
              SAFE_MODE_COOLDOWN=180
              check_safe_mode_wedge() {
                  for P in $(kubectl get pods -l "cluster=$CLUSTER,role=server" -n "$NS" \
                      -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
                      local pod_ready restart_count
                      pod_ready=$(kubectl get pod "$P" -n "$NS" \
                          -o jsonpath='{.status.containerStatuses[0].ready}' 2>/dev/null || echo "false")
                      [ "$pod_ready" = "true" ] && continue
                      restart_count=$(kubectl get pod "$P" -n "$NS" \
                          -o jsonpath='{.status.containerStatuses[0].restartCount}' 2>/dev/null || echo "0")
                      # Need at least one restart to confirm it's not initial boot
                      [ "$restart_count" -lt 1 ] && continue

                      # Cooldown per-pod
                      local last_action
                      last_action=$(get_state "$P" "safe_mode_last_action")
                      if [ -n "$last_action" ]; then
                          local last_epoch now_epoch elapsed
                          last_epoch=$(parse_epoch "$last_action")
                          now_epoch=$(date +%s)
                          elapsed=$((now_epoch - last_epoch))
                          if [ "$elapsed" -lt "$SAFE_MODE_COOLDOWN" ]; then
                              continue
                          fi
                      fi

                      # Look for the safe_mode FATAL signature in previous-instance
                      # logs (current container is mid-restart, previous has the FATAL)
                      if kubectl logs "$P" -n "$NS" --previous --tail=20 2>/dev/null \
                          | grep -q "timed out waiting for node to change IP"; then
                          log "SAFE-MODE-WEDGE: $P is stuck in safe_mode IP-patch loop"
                          # Race: pod is alive ~2 min between FATALs. exec may fail
                          # if container terminated; that's fine, next cycle retries.
                          if kubectl exec -n "$NS" "$P" -- \
                              rm -f /var/lib/rancher/k3s/k3k-node-ip 2>/dev/null; then
                              log "SAFE-MODE-WEDGE: removed stale k3k-node-ip from $P, deleting pod"
                              kubectl delete pod "$P" -n "$NS" 2>/dev/null || true
                              set_state "$P" "safe_mode_last_action" \
                                  "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
                          else
                              log "SAFE-MODE-WEDGE: exec into $P failed (mid-restart) — will retry next cycle"
                          fi
                      fi
                  done
              }

              # --- HA server pod auto-rebalancing ---
              check_pod_balance() {
                  local server_count
                  server_count=$(kubectl get clusters.k3k.io "$CLUSTER" -n "$NS" \
                      -o jsonpath='{.spec.servers}' 2>/dev/null || echo "1")
                  [ "$server_count" -le 1 ] && return 0

                  # Skip if etcd recovery is in progress
                  local recovery_state
                  recovery_state=$(kubectl get clusters.k3k.io "$CLUSTER" -n "$NS" \
                      -o jsonpath='{.metadata.annotations.k3k\.io/etcd-recovery-state}' \
                      2>/dev/null || echo "")
                  if [ -n "$recovery_state" ] && [ "$recovery_state" != "failed" ]; then
                      return 0
                  fi

                  # Build node→pod map via jsonpath (no jq dependency)
                  local node_map_file="$STATE_DIR/cluster.node_map"
                  : > "$node_map_file"
                  local pod_names total_pods=0
                  pod_names=$(kubectl get pods -l "cluster=$CLUSTER,role=server" -n "$NS" \
                      -o jsonpath='{.items[*].metadata.name}' 2>/dev/null || echo "")
                  [ -z "$pod_names" ] && return 0

                  for P in $pod_names; do
                      local node
                      node=$(kubectl get pod "$P" -n "$NS" \
                          -o jsonpath='{.spec.nodeName}' 2>/dev/null || echo "")
                      [ -z "$node" ] && continue
                      echo "${P}:${node}" >> "$node_map_file"
                      total_pods=$((total_pods + 1))
                  done

                  [ "$total_pods" -le 1 ] && return 0

                  # Find the node with the most pods
                  local max_line max_count max_node
                  max_line=$(awk -F: '{print $2}' "$node_map_file" | sort | uniq -c | sort -rn | head -1)
                  max_count=$(echo "$max_line" | awk '{print $1}')
                  max_node=$(echo "$max_line" | awk '{print $2}')

                  if [ "$max_count" -le 1 ]; then
                      # Balanced — log success if a pending rebalance just completed
                      local pending_pod
                      pending_pod=$(get_state "cluster" "rebalance_pending_pod")
                      if [ -n "$pending_pod" ]; then
                          local current_node pending_node
                          current_node=$(kubectl get pod "$pending_pod" -n "$NS" \
                              -o jsonpath='{.spec.nodeName}' 2>/dev/null || echo "")
                          pending_node=$(get_state "cluster" "rebalance_pending_node")
                          if [ -n "$current_node" ] && [ "$current_node" != "$pending_node" ]; then
                              log "Rebalance SUCCESS: $pending_pod moved from $pending_node to $current_node"
                          fi
                          set_state "cluster" "rebalance_pending_pod" ""
                          set_state "cluster" "rebalance_pending_node" ""
                      fi
                      rm -f "$STATE_DIR/cluster.rebalance_cooldown"
                      return 0
                  fi

                  log "Pod imbalance detected: $max_count pods on node $max_node"

                  # Count schedulable nodes (not cordoned)
                  local schedulable_nodes=0
                  for NODE_SCHED in $(kubectl get nodes \
                      -o jsonpath='{range .items[*]}{.metadata.name}={.spec.unschedulable}{"\n"}{end}' \
                      2>/dev/null); do
                      local unsched
                      unsched=$(echo "$NODE_SCHED" | cut -d= -f2)
                      [ "$unsched" != "true" ] && schedulable_nodes=$((schedulable_nodes + 1))
                  done

                  # Only skip if literally nowhere else to put the pod.
                  # The previous guard (schedulable_nodes < server_count) was wrong:
                  # it permanently disabled rebalance on N-servers/<N-nodes setups
                  # (e.g. 5 servers on 3 nodes), letting imbalance bake in until a
                  # drain detonated quorum.  Correct semantic: rebalance is useful
                  # whenever max_count exceeds the optimum (ceil(N/M)) AND at least
                  # 2 schedulable nodes exist to move pods between.
                  if [ "$schedulable_nodes" -lt 2 ]; then
                      log "WARN: only $schedulable_nodes schedulable node(s) — skipping rebalance (nowhere to move)"
                      return 0
                  fi
                  local optimum=$(( (server_count + schedulable_nodes - 1) / schedulable_nodes ))
                  if [ "$max_count" -le "$optimum" ]; then
                      # Already at theoretical optimum for this topology
                      return 0
                  fi

                  # Check cooldown from failed move (30min)
                  local cooldown_ts
                  cooldown_ts=$(get_state "cluster" "rebalance_cooldown")
                  if [ -n "$cooldown_ts" ]; then
                      local cooldown_epoch now_epoch
                      cooldown_epoch=$(parse_epoch "$cooldown_ts")
                      now_epoch=$(date +%s)
                      if [ $((now_epoch - cooldown_epoch)) -lt "$REBALANCE_COOLDOWN" ]; then
                          return 0
                      fi
                      rm -f "$STATE_DIR/cluster.rebalance_cooldown"
                  fi

                  # Check debounce (5min between attempts)
                  local now_epoch
                  now_epoch=$(date +%s)
                  local last_attempt
                  last_attempt=$(get_state "cluster" "last_rebalance_attempt")
                  if [ -n "$last_attempt" ]; then
                      local attempt_epoch elapsed
                      attempt_epoch=$(parse_epoch "$last_attempt")
                      elapsed=$((now_epoch - attempt_epoch))
                      if [ "$elapsed" -lt "$REBALANCE_DEBOUNCE" ]; then
                          return 0
                      fi
                      # Debounce expired — check if previous move failed
                      local pending_pod pending_node
                      pending_pod=$(get_state "cluster" "rebalance_pending_pod")
                      pending_node=$(get_state "cluster" "rebalance_pending_node")
                      if [ -n "$pending_pod" ] && [ -n "$pending_node" ]; then
                          local current_node
                          current_node=$(kubectl get pod "$pending_pod" -n "$NS" \
                              -o jsonpath='{.spec.nodeName}' 2>/dev/null || echo "")
                          if [ "$current_node" = "$pending_node" ]; then
                              log "WARN: $pending_pod still on $pending_node after rebalance — entering 30min cooldown"
                              set_state "cluster" "rebalance_cooldown" "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
                              set_state "cluster" "rebalance_pending_pod" ""
                              set_state "cluster" "rebalance_pending_node" ""
                              return 0
                          fi
                      fi
                  fi

                  # Check settle time: skip if any pod became Ready < REBALANCE_SETTLE ago
                  for P in $pod_names; do
                      local ready_ts
                      ready_ts=$(kubectl get pod "$P" -n "$NS" \
                          -o jsonpath='{.status.conditions[?(@.type=="Ready")].lastTransitionTime}' \
                          2>/dev/null || echo "")
                      if [ -n "$ready_ts" ]; then
                          local ready_epoch
                          ready_epoch=$(parse_epoch "$ready_ts")
                          if [ $((now_epoch - ready_epoch)) -lt "$REBALANCE_SETTLE" ]; then
                              log "Pod $P became Ready ${ready_ts} (<${REBALANCE_SETTLE}s ago) — waiting to settle"
                              return 0
                          fi
                      fi
                  done

                  # Pick the highest-ordinal pod on the most-loaded node (protect server-0)
                  local target_pod
                  target_pod=$(grep ":${max_node}$" "$node_map_file" | \
                      awk -F: '{print $1}' | sort -t- -k3 -n -r | head -1)

                  if [ -z "$target_pod" ] || [ "$target_pod" = "${CLUSTER}-server-0" ]; then
                      log "WARN: Would need to move server-0 — skipping (protects etcd init node)"
                      return 0
                  fi

                  log "Rebalancing: deleting $target_pod from node $max_node (scheduler will redistribute)"
                  set_state "cluster" "last_rebalance_attempt" "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
                  set_state "cluster" "rebalance_pending_pod" "$target_pod"
                  set_state "cluster" "rebalance_pending_node" "$max_node"
                  kubectl delete pod "$target_pod" -n "$NS" --grace-period=30 --wait=false 2>/dev/null || true
                  log "Pod $target_pod deleted — StatefulSet controller will recreate it"
              }

              # --- Main watch loop ---
              log "Starting k3k pod watcher (poll every ${POLL_INTERVAL}s)"

              while true; do
                  # --- Etcd recovery check (runs before per-pod processing) ---
                  RECOVERY_STATE=$(kubectl get clusters.k3k.io "$CLUSTER" -n "$NS" \
                      -o jsonpath='{.metadata.annotations.k3k\.io/etcd-recovery-state}' \
                      2>/dev/null || echo "")

                  if [ -n "$RECOVERY_STATE" ] && [ "$RECOVERY_STATE" != "failed" ]; then
                      recover_etcd_quorum
                      sleep "$POLL_INTERVAL"
                      continue
                  fi

                  if check_etcd_deadlock; then
                      recover_etcd_quorum
                      sleep "$POLL_INTERVAL"
                      continue
                  fi

                  # --- Quorum-loss check (force-delete stuck pods) ---
                  check_quorum_loss

                  # --- Safe-mode wedge check (k3k#836) ---
                  check_safe_mode_wedge

                  # --- Pod balance check (rebalance after drain/uncordon) ---
                  check_pod_balance

                  sleep "$POLL_INTERVAL"
              done
