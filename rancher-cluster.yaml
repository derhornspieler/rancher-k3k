---
# k3k Virtual Cluster for Rancher
# Apply this after the k3k controller is running.
#
# Placeholders replaced by deploy.sh:
#   __SERVER_COUNT__    - Number of server nodes (1 or 3)
#   __PVC_SIZE__        - PVC storage size
#   __STORAGE_CLASS__   - Kubernetes StorageClass name
#   __TLS_SANS__        - TLS Subject Alternative Names (injected by deploy.sh)
#   __EXTRA_SERVER_ARGS__ - Additional K3s server arguments
#   __SECRET_MOUNTS__   - Secret mount configuration
#   __CUSTOM_CAS__      - Custom CA configuration (injected by deploy.sh)
---
apiVersion: v1
kind: Namespace
metadata:
  name: rancher-k3k
---
apiVersion: k3k.io/v1beta1
kind: Cluster
metadata:
  name: rancher
  namespace: rancher-k3k
spec:
  # Virtual mode: complete isolation with dedicated K3s server pods
  mode: virtual

  # Server node count (1=standalone, 3=HA)
  servers: __SERVER_COUNT__
  agents: 0

  # Use distinct CIDRs to avoid conflict with host cluster
  clusterCIDR: 10.42.0.0/16
  serviceCIDR: 10.43.0.0/16

  # Persist cluster data
  persistence:
    type: dynamic
    storageClassName: __STORAGE_CLASS__
    storageRequestSize: __PVC_SIZE__

  # Disable network policy controller (stale node IP crash on reschedule)
  # Disable Traefik (host NGINX handles ingress via native sync)
  serverArgs:
    - "--disable-network-policy"
    - "--disable=traefik"
__EXTRA_SERVER_ARGS__

__SECRET_MOUNTS__

  # Expose k3k API via ingress (SSL passthrough, firewall-friendly port 443)
  expose:
    ingress:
      ingressClassName: nginx
      annotations:
        nginx.ingress.kubernetes.io/ssl-passthrough: "true"

  # TLS Subject Alternative Names for the k3k API server certificate
  tlsSANs:
__TLS_SANS__

  # Sync resources from vCluster to host cluster
  # Ingresses + services enabled: replaces manual host-ingress.yaml and rancher-k3k-traefik service
  sync:
    ingresses:
      enabled: true
    services:
      enabled: true

__CUSTOM_CAS__
