# Primary hostname (backward compat — used if HOSTNAMES is not set)
HOSTNAME="rancher.hvst-vip.aegisgroup.ch"

# Comma-separated list of all FQDNs for Rancher
# First entry is the primary hostname. All are added to cert-manager dnsNames and k3k tlsSANs.
# Add CNAMEs here as you create them (e.g. rancher.aegisgroup.ch)
HOSTNAMES="rancher.hvst-vip.aegisgroup.ch"

# k3k API server hostname (exposed via ingress with SSL passthrough on port 443)
K3K_API_HOSTNAME="k3k.hvst-vip.aegisgroup.ch"

# Use private CA for k3k API server TLS (uses CA_CERT_PATH/CA_KEY_PATH)
CUSTOM_CA="true"

BOOTSTRAP_PW="admin1234567"
PVC_SIZE="40Gi"
STORAGE_CLASS="harvester-longhorn"
SERVER_COUNT=3
TLS_SOURCE="secret"
PRIVATE_REGISTRY=""
PRIVATE_CA_PATH=""

# Intermediate CA for cert-manager CA Issuer (signs Rancher leaf certs)
CA_CERT_PATH="/home/rocky/code/harvester-rke2-svcs/services/pki/intermediates/k3k-signing/k3k-signing-ca.pem"
CA_KEY_PATH="/home/rocky/code/harvester-rke2-svcs/services/pki/intermediates/k3k-signing/k3k-signing-ca-key.pem"

# Root CA trust anchor (Rancher /cacerts endpoint, client trust stores)
CA_ROOT_PATH="/home/rocky/code/harvester-rke2-svcs/services/pki/roots/root-ca.pem"

RANCHER_VERSION="v2.13.3"
CONFIRM="yes"
